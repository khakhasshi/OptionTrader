# Alembic 配置。DATABASE_URL 由 env.py 从环境变量读取（覆盖此处占位）。
[alembic]
script_location = ../../migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+psycopg://optiontrader:optiontrader@localhost:5432/optiontrader

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
