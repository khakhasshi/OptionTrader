syntax = "proto3";

// Broker adapter/sidecar boundary. Rust Risk & Execution Gateway is the only
// client allowed to invoke mutations; sidecars never evaluate strategy or risk.
package optiontrader.broker.v1;

enum BrokerId {
  BROKER_ID_UNSPECIFIED = 0;
  BROKER_ID_LONGBRIDGE = 1;
  BROKER_ID_IBKR = 2;
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
}

enum BrokerOrderType {
  BROKER_ORDER_TYPE_UNSPECIFIED = 0;
  BROKER_ORDER_TYPE_MARKET = 1;
  BROKER_ORDER_TYPE_LIMIT = 2;
  BROKER_ORDER_TYPE_ADAPTIVE_LIMIT = 3;
}

enum AdaptivePriority {
  ADAPTIVE_PRIORITY_UNSPECIFIED = 0;
  ADAPTIVE_PRIORITY_PASSIVE = 1;
  ADAPTIVE_PRIORITY_NORMAL = 2;
  ADAPTIVE_PRIORITY_URGENT = 3;
}

enum BrokerHealth {
  BROKER_HEALTH_UNSPECIFIED = 0;
  BROKER_HEALTH_HEALTHY = 1;
  BROKER_HEALTH_DEGRADED = 2;
  BROKER_HEALTH_DISCONNECTED = 3;
  BROKER_HEALTH_RECONCILING = 4;
}

enum BrokerOrderStatus {
  BROKER_ORDER_STATUS_UNSPECIFIED = 0;
  BROKER_ORDER_STATUS_WORKING = 1;
  BROKER_ORDER_STATUS_PARTIAL_FILL = 2;
  BROKER_ORDER_STATUS_FILLED = 3;
  BROKER_ORDER_STATUS_CANCELLED = 4;
  BROKER_ORDER_STATUS_REJECTED = 5;
  BROKER_ORDER_STATUS_RECONCILE_PENDING = 6;
}

message AccountSnapshot {
  BrokerId broker_id = 1;
  string occurred_at_utc = 2;
  BrokerHealth health = 3;
  bool reconciled = 4;
  string buying_power = 5;
  string net_liquidation = 6;
  string currency = 7;
}

message PositionSnapshot {
  string contract_id = 1;
  sint32 quantity = 2;
  string average_price = 3;
}

message BrokerOrderLeg {
  string contract_id = 1;
  OrderSide side = 2;
  uint32 quantity = 3;
  // Broker-native stable identifier: numeric conId for IBKR, SDK option symbol
  // for Longbridge. contract_id remains the provider-neutral audit identity.
  string broker_contract_id = 4;
  string symbol = 5;
  string exchange = 6;
  // Rust-authoritative per-leg price for sequential execution. Empty only for MKT.
  string submitted_price = 7;
}

message BrokerChildOrderSnapshot {
  string broker_order_id = 1;
  uint32 leg_index = 2;
  string contract_id = 3;
  OrderSide side = 4;
  uint32 quantity = 5;
  uint32 filled_quantity = 6;
  BrokerOrderStatus status = 7;
  string submitted_price = 8;
}

message BrokerOrderSnapshot {
  string broker_order_id = 1;
  string idempotency_key = 2;
  string plan_hash = 3;
  BrokerOrderStatus status = 4;
  // Number of combo units; each leg quantity must equal this value.
  uint32 total_quantity = 5;
  uint32 filled_quantity = 6;
  // Empty only for MARKET. ADAPTIVE_LIMIT carries the Rust-authority price.
  string submitted_price = 7;
  repeated BrokerOrderLeg legs = 8;
  OrderSide side = 9;
  BrokerOrderType order_type = 10;
  AdaptivePriority adaptive_priority = 11;
  repeated BrokerChildOrderSnapshot child_orders = 12;
  bool residual_exposure = 13;
}

message FillSnapshot {
  string fill_id = 1;
  string broker_order_id = 2;
  string contract_id = 3;
  OrderSide side = 4;
  uint32 quantity = 5;
  string price = 6;
  string occurred_at_utc = 7;
}

message BrokerSnapshot {
  string schema_version = 1;
  uint64 snapshot_sequence = 2;
  AccountSnapshot account = 3;
  repeated PositionSnapshot positions = 4;
  repeated BrokerOrderSnapshot orders = 5;
  repeated FillSnapshot fills = 6;
}

message GetBrokerSnapshotRequest {
  BrokerId broker_id = 1;
}

message SubmitBrokerOrderRequest {
  BrokerId broker_id = 1;
  string idempotency_key = 2;
  string plan_hash = 3;
  // Number of combo units; each leg quantity must equal this value.
  uint32 total_quantity = 4;
  // Empty only for MARKET. Sidecars must not calculate or relax this price.
  string submitted_price = 5;
  repeated BrokerOrderLeg legs = 6;
  OrderSide side = 7;
  BrokerOrderType order_type = 8;
  AdaptivePriority adaptive_priority = 9;
}

message CancelBrokerOrderRequest {
  BrokerId broker_id = 1;
  string broker_order_id = 2;
}

// Read-only restart recovery. The adapter may attach durable identities to an
// existing native order only after every broker-visible field matches. It must
// never submit a new order from this RPC.
message RecoverBrokerOrderRequest {
  SubmitBrokerOrderRequest expected_order = 1;
  string expected_broker_order_id = 2;
}

message ReconcileBrokerRequest {
  BrokerId broker_id = 1;
  uint64 expected_snapshot_sequence = 2;
}

message ReconcileBrokerResponse {
  BrokerSnapshot snapshot = 1;
  bool matched = 2;
  repeated string mismatch_codes = 3;
}

service BrokerAdapterService {
  rpc GetBrokerSnapshot(GetBrokerSnapshotRequest) returns (BrokerSnapshot);
  rpc SubmitBrokerOrder(SubmitBrokerOrderRequest) returns (BrokerOrderSnapshot);
  rpc CancelBrokerOrder(CancelBrokerOrderRequest) returns (BrokerOrderSnapshot);
  rpc RecoverBrokerOrder(RecoverBrokerOrderRequest) returns (BrokerOrderSnapshot);
  rpc ReconcileBroker(ReconcileBrokerRequest) returns (ReconcileBrokerResponse);
}
